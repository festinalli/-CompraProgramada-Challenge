services:
  mysql:
    image: mysql:8.0
    container_name: corretora-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: corretora
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.3.0
    container_name: corretora-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.3.0
    container_name: corretora-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: corretora-api
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_started
    ports:
      - "5000:8080"
    environment:
      - ConnectionStrings__DefaultConnection=server=mysql;database=corretora;user=corretora_user;password=${DB_PASSWORD}
      - Kafka__BootstrapServers=kafka:29092
      - Cotacoes__PastaLocal=/app/cotacoes
      - JWT__SecretKey=${JWT_SECRET_KEY}
      - Admin__Username=${ADMIN_USERNAME}
      - Admin__Password=${ADMIN_PASSWORD}
    volumes:
      - ../cotacoes:/app/cotacoes

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    container_name: corretora-frontend
    depends_on:
      - api
    ports:
      - "80:80"
    environment:
      - API_URL=http://api:80/api

volumes:
  mysql_data:
